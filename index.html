<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Liga Chuy</title>
</head>
<body>



    <section class="menu-arriba">
        <header class="header">

        </header>
    </section>

    <section class="inicio">
        <div class="informacion-detalles">
            <div class="izquierda">
                <div class="fecha-div"><p class="fecha">Fecha 1</p></div>
                <div class="nombres-clubs">
                    <p class="nombre-clubs-p">san vicente</p>
                    <p class="vs">VS</p>
                    <p class="nombre-clubs-p">internacional</p>
                </div>
                <div class="datos-partido">
                    <p class="dia-partido">domingo 19 de mayo, 2026</p>
                    <p class="hora-partido">15:30 hs</p>
                    <p class="ubicacion-partido">local internacional</p>
                </div>
                <a href="" class="ver-detalles">ver detalles</a>
            </div>
            <div class="derecha">
                <div class="equipos-imagen-vs">
                    <img src="internacional.png" alt="" class="logo-equipo-img">
                    <p class="vs">VS</p>
                    <img src="san-vicente.png" alt="" class="logo-equipo-img">
                </div>
                <div class="falta-para-partido">
                    <p class="falta-para-partido-p">falta para el partido</p>
                    <div class="cronometro">00 | 00 | 00</div>
                </div>
            </div>
        </div>
    </section>

    <div class="informacion">
        <div class="infromacion-cards">
            <div class="ultimos-resultados">
                <p class="ultimos-resultados-p">ultimos resultados</p>
                <a href="" class="ver-mas">ver todos</a>
            </div>
            <div class="partido">
                <div class="equipo"><img src="pdd.png" alt=""><p class="nombre-club">punta del diablo</p></div>
                <p class="resultado">-</p>
                <div class="equipo"><p class="nombre-club">nacional</p><img src="https://cndef.nyc3.cdn.digitaloceanspaces.com/files/page-file/Escudo%20Nacional.png" alt=""></div>
            </div>
            <div class="partido">
                <div class="equipo"><img src="pdd.png" alt=""><p class="nombre-club">central palestino</p></div>
                <p class="resultado">-</p>
                <div class="equipo"><p class="nombre-club">manya</p><img src="https://cndef.nyc3.cdn.digitaloceanspaces.com/files/page-file/Escudo%20Nacional.png" alt=""></div>
            </div>
        </div>
        <div class="infromacion-cards">
            <div class="tabla">
                <p class="tabla-p">tabla</p>
                <a href="" class="ver-mas">ver completa</a>
            </div>
        </div>
        <div class="infromacion-cards">
            <div class="goleadores">
                <p class="tabla-p">goleadores</p>
                <a href="" class="ver-mas">ver todos</a>
            </div>
        </div>
    </div>

</body>
</html>
